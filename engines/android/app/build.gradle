plugins {
    id "com.android.application"
}

android {
    namespace "com.autolua.engine"
    compileSdk 34

    defaultConfig {
        applicationId "com.autolua.engine"
        minSdk 23
        targetSdk 34
        versionCode 1
        versionName "0.1.0"

        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17 -Wall -Wextra"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path file("src/main/cpp/CMakeLists.txt")
            version "3.22.1"
        }
    }
}

dependencies {
    implementation "androidx.core:core:1.13.1"
    // 让 WebView 在 HTML 的首段脚本执行前注入 AutoLua，页面可直接在初始化阶段调用 UI 桥。
    implementation "androidx.webkit:webkit:1.11.0"
}
